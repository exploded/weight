<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Tracker</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/chart.min.js"></script>
    <script src="/static/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Weight Tracker</h1>
        </header>
        <main>
            <div class="chart-container">
                <canvas id="weightChart"></canvas>
            </div>
            <div class="controls">
                <select id="daysFilter">
                    <option value="30">Last 30 days</option>
                    <option value="90">Last 90 days</option>
                    <option value="180">Last 6 months</option>
                    <option value="365">Last year</option>
                    <option value="since:2026-01-01">Start at 1 Jan 2026</option>
                    <option value="since:2026-03-19" selected>Start at 19 Mar 2026</option>
                    <option value="0">All time</option>
                </select>
            </div>
            <div class="summary" id="summary"></div>
            <div class="table-container">
                <table id="weightTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Weight (kg)</th>
                        </tr>
                    </thead>
                    <tbody id="weightBody">
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
